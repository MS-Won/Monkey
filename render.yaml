services:
  - type: web
    name: monkey-backend
    runtime: docker
    # TODO: switch to `starter` (or higher) before real store submission.
    # Free tier sleeps after 15 min idle and cold-starts slowly (JVM/Okt
    # init on top of the base cold start) — fine for now, not for prod.
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
